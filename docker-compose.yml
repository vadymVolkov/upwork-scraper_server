services:
  upwork-cli:
    build: .
    environment:
      - 'jsonInput={"search":{"query":"n8n","limit":10}}'
    command: ["python", "-m", "src.cli.app", "--command", "search"]

  upwork-api:
    build: .
    environment:
      - API_KEYS=change-me
      - NON_INTERACTIVE=1
    command: ["uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
